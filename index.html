<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>1年 前期（1S）</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Share+Tech+Mono&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{background:#0d1117;color:#e6edf3;font-family:'Noto Sans JP',sans-serif;min-height:100vh;padding:6px 4px 20px}

header{display:flex;flex-direction:column;align-items:center;gap:5px;margin-bottom:6px}
header h1{font-size:0.85rem;font-weight:900;letter-spacing:0.1em;color:#e6edf3}

#now-banner{display:flex;align-items:center;justify-content:center;gap:6px;padding:5px 10px;border-radius:10px;background:linear-gradient(135deg,#0d2137,#0a1628);border:1.5px solid rgba(88,166,255,0.5);animation:bglow 2s ease-in-out infinite;width:100%;flex-wrap:wrap}
@keyframes bglow{0%,100%{box-shadow:0 0 12px rgba(88,166,255,0.2);border-color:rgba(88,166,255,0.45)}50%{box-shadow:0 0 28px rgba(88,166,255,0.55);border-color:rgba(88,166,255,1)}}
.bdot{width:6px;height:6px;border-radius:50%;background:#58a6ff;animation:db 1s ease-in-out infinite;flex-shrink:0}
@keyframes db{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.1;transform:scale(0.4)}}
#banner-day{font-size:0.95rem;font-weight:900;color:#fff;letter-spacing:0.08em;white-space:nowrap}
.bsep{font-size:0.8rem;color:rgba(88,166,255,0.3)}
#clock{font-family:'Share Tech Mono',monospace;font-size:1.2rem;color:#58a6ff;letter-spacing:0.08em;white-space:nowrap}
#banner-period{font-size:0.6rem;color:#fff;font-weight:700;background:rgba(88,166,255,0.18);border:1px solid rgba(88,166,255,0.5);padding:2px 7px;border-radius:10px;letter-spacing:0.06em;white-space:nowrap;animation:pb 1.2s ease-in-out infinite}
@keyframes pb{0%,100%{background:rgba(88,166,255,0.22)}50%{background:rgba(88,166,255,0.04)}}

.tbl-wrap{border-radius:8px;border:1px solid #3a4250;box-shadow:0 0 24px rgba(0,0,0,0.5);overflow:hidden}
table{border-collapse:collapse;width:100%;table-layout:fixed}

th {
    background: #1c2128;
    color: #ffffff; /* 青色(#58a6ff)から白(#ffffff)に変更 */
    font-size: 0.88rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-align: center;
    padding: 4px 2px;
    border: 1px solid #3a4250;
    height: 26px;
    white-space: nowrap;
}

/* --- 本日の曜日のスタイル（白背景・青文字） --- */
th.today-col {
    background: #ffffff !important; /* 背景を白に */
    color: #1060d0 !important;      /* 文字を濃い青に */
    font-weight: 900;
    animation: none !important;     /* 以前のアニメーションを無効化 */
}
@keyframes chg{0%,100%{background:rgba(88,166,255,0.18)}50%{background:rgba(88,166,255,0.35)}}

td.pc{background:#161b22;font-family:'Share Tech Mono',monospace;font-size:0.8rem;color:#8b949e;text-align:center;border:1px solid #3a4250;padding:0;height:38px;font-weight:700;vertical-align:middle}
td.tc{background:#1c2128;font-family:'Share Tech Mono',monospace;font-size:0.62rem;color:#c0c8d4;text-align:center;border:1px solid #3a4250;padding:1px;height:38px;line-height:1.3;white-space:nowrap;font-weight:700;vertical-align:middle}
.next-row{color:rgba(255,255,255,0.85)!important;font-weight:700!important}

td.cc{position:relative;text-align:center;vertical-align:middle;border:1px solid #3a4250;padding:2px;height:38px;overflow:hidden}
td.cc.empty{background:#252d38}

.cn{font-weight:700;line-height:1.2;font-size:0.58rem;color:#111;display:block}
.cr{font-size:0.58rem;margin-top:1px;font-family:'Noto Sans JP',sans-serif;color:#fff;font-weight:700;display:block}

/* 画像の色に合わせたカラー設定 */
.c-green  { background: #92d050; } /* 物理学基礎 */
.c-cyan   { background: #00b0f0; } /* 視覚造形 / 数理データ */
.c-orange { background: #ffc000; } /* ドイツ語 / 知能メディア体験 */
.c-purple { background: #cc99ff; } /* 英語表現 / 英語理解 */
.c-pink   { background: #ff99cc; } /* 哲学 / 日本語表現 */
.c-lblue  { background: #9bc2e6; } /* 数学基礎 */
.c-yellow { background: #ffc000; } /* ドイツ語(オレンジと統合) */
.c-club   { background: #ffffff; } /* 部活 */

/* 文字色の微調整（背景が明るいので文字を黒に） */
.cn { color: #000 !important; } /* 授業名は黒（!importantで固定） */
.cr { color: #fff !important; } /* 教室名は白（!importantで固定） */

@keyframes aglow{0%,100%{box-shadow:0 0 0 3px rgba(255,255,255,0.9),0 0 16px 4px rgba(88,166,255,0.7)}50%{box-shadow:0 0 0 3px rgba(255,255,255,0.35),0 0 28px 10px rgba(88,166,255,0.15)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.35}}
td.cc.active{animation:aglow 1.2s ease-in-out infinite;filter:brightness(1.3) saturate(1.4);z-index:2}
td.cc.active .cn{animation:blink 1.2s ease-in-out infinite}
td.cc.active::after{content:'▶NOW';position:absolute;top:2px;right:2px;font-family:'Share Tech Mono',monospace;font-size:0.4rem;color:#fff;background:rgba(0,0,0,0.6);padding:1px 2px;border-radius:2px;animation:blink 1.2s ease-in-out infinite}

td.cc.next-class{filter:brightness(1.15) saturate(1.2);z-index:1;outline:3px solid #fff;outline-offset:-3px}
td.cc.next-class::after{content:'NEXT';position:absolute;top:2px;right:2px;font-family:'Share Tech Mono',monospace;font-size:0.4rem;color:#fff;background:rgba(0,0,0,0.6);padding:1px 2px;border-radius:2px}

td.cc.past::before{content:'';position:absolute;inset:0;background:rgba(13,17,23,0.72);z-index:1;pointer-events:none}
td.cc.past .cn{position:relative;z-index:2;color:#d1d5da !important}
td.cc.past .cr{position:relative;z-index:2;color:#b1b8c0 !important}

#info-card{margin-top:8px;border-radius:10px;overflow:hidden;border:1px solid #3a4250;display:none}
.irow{display:flex;align-items:stretch;border-bottom:1px solid #3a4250}
.irow:last-child{border-bottom:none}
.ibadge{display:flex;align-items:center;justify-content:center;padding:0 10px;font-size:0.58rem;font-weight:900;letter-spacing:0.08em;white-space:nowrap;min-width:48px;flex-shrink:0}
.ibadge.now{background:rgba(88,166,255,0.18);color:#58a6ff;border-right:2px solid #58a6ff}
.ibadge.nxt{background:#fff;color:#111;border-right:2px solid rgba(255,255,255,0.7);font-size:0.65rem}
.icont{display:flex;align-items:center;gap:8px;padding:6px 10px;flex:1;background:#161b22}
.idot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.iname{font-weight:700;font-size:0.75rem;flex:1;color:#e6edf3}
.idet{font-family:'Share Tech Mono',monospace;font-size:0.58rem;color:#c0c8d4;text-align:right;white-space:nowrap;line-height:1.4}
.irow.now-info{animation:nri 1.2s ease-in-out infinite}
@keyframes nri{0%,100%{background:rgba(88,166,255,0.06)}50%{background:transparent}}

footer{text-align:center;margin-top:10px;font-size:0.56rem;color:#3d444d;letter-spacing:0.1em}
</style>
</head>
<body>
<header>
  <h1>1年　前期（1S）</h1>
  <div id="now-banner">
    <div class="bdot"></div>
    <div id="banner-day">―曜日</div>
    <div class="bsep">|</div>
    <div id="clock">--:--:--</div>
    <div class="bsep">|</div>
    <div id="banner-period">読み込み中...</div>
    <div class="bdot"></div>
  </div>
</header>

<div class="tbl-wrap">
<table id="main-table">
<colgroup>
  <col style="width:22px"><col style="width:44px">
  <col><col><col><col><col>
</colgroup>
<thead>
<tr>
  <th></th><th>時間</th>
  <th id="th-1">月</th><th id="th-2">火</th><th id="th-3">水</th><th id="th-4">木</th><th id="th-5">金</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<div id="info-card"></div>
<footer>リアルタイム時間割 — 毎秒更新</footer>

<script>
const P={
  1:[9,0,9,59],2:[10,0,10,59],3:[11,0,11,59],4:[12,0,12,59],5:[13,0,13,59],
  6:[14,0,14,59],7:[15,0,15,59],8:[16,0,16,59],9:[17,0,17,59],10:[18,0,18,59]
};
const TL={1:'09:00',2:'10:00',3:'11:00',4:'12:00',5:'13:00',6:'14:00',7:'15:00',8:'16:00',9:'17:00',10:'18:00'};

const SCH={
  1:{
    1:{name:'物理学基礎',  room:'8108',              color:'c-green', rs:3},
    5:{name:'ドイツ語',    room:'5301',              color:'c-yellow',rs:2},
    7:{name:'物理学基礎 b',room:'8108',              color:'c-green', rs:1}
  },
  2:{
    1:{name:'視覚造形基礎',room:'12号5階\n各共用製図',color:'c-cyan',  rs:4},
    6:{name:'英語理解',    room:'5203',              color:'c-purple',rs:2},
    8:{name:'数学基礎 c',  room:'8106',              color:'c-lblue', rs:1},
    9:{name:'部活',        room:'',                  color:'c-club',  rs:2}
  },
  3:{
    1:{name:'知能メディア\n体験演習',room:'12号3階\n教室兼実習',color:'c-orange',rs:4},
    7:{name:'日本語表現法',room:'5303',              color:'c-pink',  rs:2}
  },
  4:{
    2:{name:'英語表現',    room:'5207',              color:'c-purple',rs:2},
    5:{name:'哲学',        room:'5201',              color:'c-pink',  rs:2}
  },
  5:{
    1:{name:'数学基礎',    room:'8106',              color:'c-lblue', rs:3},
    5:{name:'初年次教育',  room:'3212',              color:'c-orange',rs:2},
    7:{name:'数理・データ\nサイエンスAI',room:'3212',color:'c-cyan',  rs:2},
    9:{name:'部活',        room:'',                  color:'c-club',  rs:2}
  }
};

const COLOR_HEX = {
  'c-green':  '#92d050',
  'c-cyan':   '#00b0f0',
  'c-orange': '#ffc000',
  'c-purple': '#cc99ff',
  'c-pink':   '#ff99cc',
  'c-lblue':  '#9bc2e6',
  'c-yellow': '#ffc000',
  'c-club':   '#ffffff'
};
const DAYS=[1,2,3,4,5];
const WFULL=['日曜日','月曜日','火曜日','水曜日','木曜日','金曜日','土曜日'];
const PC=10;

function toMin(h,m){return h*60+m}
function fmt2(n){return String(n).padStart(2,'0')}
function getCurP(nm){for(let p=1;p<=PC;p++){const[sh,sm,eh,em]=P[p];if(nm>=toMin(sh,sm)&&nm<=toMin(eh,em))return p;}return null}
function getCellFor(di,p){const d=SCH[di]||{};for(let sp=1;sp<=p;sp++){const c=d[sp];if(c&&sp+(c.rs||1)-1>=p)return{sp,cell:c};}return null}
function getNext(di,nm){const d=SCH[di]||{};let best=null;for(const k in d){const[sh,sm]=P[k];if(toMin(sh,sm)>nm&&(!best||toMin(sh,sm)<toMin(...P[best.sp].slice(0,2))))best={sp:parseInt(k),cell:d[k]};}return best}
function isPast(ep,nm){const[,,eh,em]=P[ep];return nm>toMin(eh,em)}

function buildTable(){
  const tbody=document.getElementById('tbody');
  tbody.innerHTML='';
  const skip={1:{},2:{},3:{},4:{},5:{}};
  for(let p=1;p<=PC;p++){
    const tr=document.createElement('tr');
    const tp=document.createElement('td');tp.className='pc';tp.id='fp-'+p;tp.dataset.pr=p;tp.textContent=p;tr.appendChild(tp);
    const tt=document.createElement('td');tt.className='tc';tt.id='ft-'+p;tt.dataset.pr=p;tt.textContent=TL[p];tr.appendChild(tt);
    DAYS.forEach(di=>{
      if(skip[di][p])return;
      const cell=(SCH[di]||{})[p];
      const td=document.createElement('td');td.className='cc';td.id='c-'+di+'-'+p;td.dataset.day=di;td.dataset.p=p;
      if(cell){
        const rs=cell.rs||1;td.dataset.ep=p+rs-1;
        if(rs>1){td.rowSpan=rs;for(let r=p+1;r<p+rs;r++)skip[di][r]=true;}
        td.classList.add(cell.color);
        const ne=document.createElement('span');ne.className='cn';ne.innerHTML=cell.name.replace(/\n/g,'<br>');td.appendChild(ne);
        if(cell.room){const re=document.createElement('span');re.className='cr';re.innerHTML=cell.room.replace(/\n/g,'<br>');td.appendChild(re);}
      } else {
        td.classList.add('empty');td.dataset.ep=p;
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  }
}

// ── now-row: JSで直接backgroundColor/colorを書き込む ──
const PC_DEFAULT_BG='#161b22';
const TC_DEFAULT_BG='#1c2128';
const PC_DEFAULT_COLOR='#8b949e';
const TC_DEFAULT_COLOR='#c0c8d4';

function applyNowRow(p, on){
  const pe=document.getElementById('fp-'+p);
  const te=document.getElementById('ft-'+p);
  if(!pe||!te)return;
  pe.style.backgroundColor = on ? '#ffffff' : PC_DEFAULT_BG;
  pe.style.color            = on ? '#1060d0' : PC_DEFAULT_COLOR;
  pe.style.fontWeight       = on ? '900' : '700';
  te.style.backgroundColor  = on ? '#ffffff' : TC_DEFAULT_BG;
  te.style.color             = on ? '#1060d0' : TC_DEFAULT_COLOR;
  te.style.fontWeight        = on ? '900' : '700';
}

let prevP=null;

function update(){
  const now=new Date();
  const h=now.getHours(),m=now.getMinutes(),s=now.getSeconds();
  const dow=now.getDay(),nm=toMin(h,m);
  const todayDi=DAYS.includes(dow)?dow:null;

  document.getElementById('clock').textContent=fmt2(h)+':'+fmt2(m)+':'+fmt2(s);
  document.getElementById('banner-day').textContent=WFULL[dow];

  const cp=getCurP(nm);
  document.getElementById('banner-period').textContent=cp
    ?(()=>{const[sh,sm,eh,em]=P[cp];return'第'+cp+'限 '+fmt2(sh)+':'+fmt2(sm)+'〜'+fmt2(eh)+':'+fmt2(em);})()
    :'授業時間外';

  DAYS.forEach(d=>{const th=document.getElementById('th-'+d);if(th)th.classList.toggle('today-col',d===todayDi);});

  // 前の now-row をリセット
  if(prevP!==null){applyNowRow(prevP,false);prevP=null;}
  // next-row リセット
  document.querySelectorAll('.next-row').forEach(el=>el.classList.remove('next-row'));

  let activeCellData=null,nextData=null;
  if(todayDi){
    if(cp!==null){const f=getCellFor(todayDi,cp);if(f)activeCellData=f;}
    nextData=getNext(todayDi,nm);
    if(cp){applyNowRow(cp,true);prevP=cp;}
    if(nextData){
      const pe=document.getElementById('fp-'+nextData.sp);
      const te=document.getElementById('ft-'+nextData.sp);
      if(pe)pe.classList.add('next-row');
      if(te)te.classList.add('next-row');
    }
  }

  document.querySelectorAll('td.cc').forEach(el=>{
    el.classList.remove('active','next-class','past');
    if(el.classList.contains('empty'))return;
    const di=parseInt(el.dataset.day);if(di!==todayDi)return;
    const sp=parseInt(el.dataset.p),ep=parseInt(el.dataset.ep);
    if(cp!==null&&cp>=sp&&cp<=ep)el.classList.add('active');
    else if(nextData&&sp===nextData.sp)el.classList.add('next-class');
    else if(isPast(ep,nm))el.classList.add('past');
  });

  updateInfoCard(activeCellData,nextData);
}

function updateInfoCard(act, nxt) {
  const card = document.getElementById('info-card');
  if (!act && !nxt) {
    card.style.display = 'none';
    return;
  }
  card.style.display = 'block';
  card.innerHTML = '';

  const now = new Date();
  const todayDi = now.getDay();

  function row(label, cls, cell, sp, day) {
    const dayName = WFULL[day]; 
    const d = document.createElement('div');
    d.className = 'irow' + (cls ? ' ' + cls : '');

    d.innerHTML = `
      <div class="ibadge ${label === '現在' ? 'now' : 'nxt'}">${label}</div>
      <div class="icont">
        <div class="iname" style="font-size:0.8rem;">
          ${dayName} 第${sp}限：${cell.name.replace(/\n/g, ' ')} 
          <span style="color:#8b949e; font-size:0.7rem; margin-left:8px;">
            ${cell.room ? '[' + cell.room.replace(/\n/g, ' ') + ']' : ''}
          </span>
        </div>
      </div>`;
    return d;
  }

  if (act) card.appendChild(row('現在', 'now-info', act.cell, act.sp, todayDi));
  if (nxt) card.appendChild(row('次回', '', nxt.cell, nxt.sp, todayDi));
} 

buildTable();
update();
setInterval(update, 1000);
</script>

</html>

  <div id="map-legend" style="padding:6px 10px;font-size:0.65rem;color:#8b949e;display:flex;gap:12px;flex-wrap:wrap;background:#1c2128;border-top:1px solid #3a4250;">

<script>
// ── 教室番号 → 号館番号 ──
function getRoomBuilding(room) {
  if (!room) return null;
  // "12号3階" や "12号5階" → 12
  const m12 = room.match(/12[号]/);
  if (m12) return 12;
  // "8108" → 8, "5207" → 5 など（先頭1〜2桁）
  const m4 = room.match(/^(\d{1,2})\d{2,3}/);
  if (m4) return parseInt(m4[1]);
  return null;
}

// ── アニメーション用 keyframes を JS で追加 ──
const mapStyle = document.createElement('style');
mapStyle.textContent = `
  @keyframes map-now-glow {
    0%,100% { fill:rgba(88,166,255,0.25); stroke:#58a6ff; stroke-width:4; }
    50%      { fill:rgba(88,166,255,0.55); stroke:#58a6ff; stroke-width:6; }
  }
  @keyframes map-nxt-glow {
    0%,100% { fill:rgba(240,180,41,0.2);  stroke:#f0b429; stroke-width:3; }
    50%      { fill:rgba(240,180,41,0.45); stroke:#f0b429; stroke-width:5; }
  }
  @keyframes map-txt-now {
    0%,100% { fill:#58a6ff; opacity:1; }
    50%      { fill:#fff;    opacity:0.8; }
  }
  @keyframes map-txt-nxt {
    0%,100% { fill:#f0b429; opacity:1; }
    50%      { fill:#fff;    opacity:0.8; }
  }
  .map-bld-now { animation: map-now-glow 1.2s ease-in-out infinite; }
  .map-bld-nxt { animation: map-nxt-glow 1.5s ease-in-out infinite; }
  .map-lbl-now { animation: map-txt-now  1.2s ease-in-out infinite; }
  .map-lbl-nxt { animation: map-txt-nxt  1.5s ease-in-out infinite; }
`;
document.head.appendChild(mapStyle);

// ── マップ更新関数 ──
function updateMap(nowRoom, nxtRoom) {
  const nowBld = getRoomBuilding(nowRoom);
  const nxtBld = getRoomBuilding(nxtRoom);
  const bldNums = [1,2,3,5,7,8,9,11,12];

  bldNums.forEach(n => {
    const rect = document.getElementById('bld-'+n);
    const lbl  = document.getElementById('lbl-'+n);
    if (!rect || !lbl) return;
    // リセット
    rect.className = '';
    rect.setAttribute('fill','none');
    rect.setAttribute('stroke','none');
    lbl.className = '';
    lbl.setAttribute('fill','none');

    if (nowBld === n) {
      rect.className = 'map-bld-now';
      lbl.className  = 'map-lbl-now';
    } else if (nxtBld === n && nxtBld !== nowBld) {
      rect.className = 'map-bld-nxt';
      lbl.className  = 'map-lbl-nxt';
    }
  });

  // 凡例
  document.getElementById('legend-now').style.display  = nowBld ? 'inline' : 'none';
  document.getElementById('legend-nxt').style.display  = (nxtBld && nxtBld !== nowBld) ? 'inline' : 'none';
  document.getElementById('legend-none').style.display = (!nowBld && !nxtBld) ? 'inline' : 'none';
}

// ── updateInfoCard をフック ──

  _origUpdateInfoCard(act, nxt);
  const nowRoom = act ? act.cell.room : null;
  const nxtRoom = nxt ? nxt.cell.room : null;
  updateMap(nowRoom, nxtRoom);
};

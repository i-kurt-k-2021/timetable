<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>1年 前期（1S）</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Share+Tech+Mono&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{background:#0d1117;color:#e6edf3;font-family:'Noto Sans JP',sans-serif;min-height:100vh;padding:6px 4px 16px}

header{display:flex;flex-direction:column;align-items:center;gap:4px;margin-bottom:5px}
header h1{font-size:0.85rem;font-weight:900;letter-spacing:0.1em;color:#e6edf3}

#now-banner{display:flex;align-items:center;justify-content:center;gap:6px;padding:4px 10px;border-radius:10px;background:linear-gradient(135deg,#0d2137,#0a1628);border:1.5px solid rgba(88,166,255,0.5);animation:bglow 2s ease-in-out infinite;width:100%;flex-wrap:wrap}
@keyframes bglow{0%,100%{box-shadow:0 0 12px rgba(88,166,255,0.2);border-color:rgba(88,166,255,0.45)}50%{box-shadow:0 0 28px rgba(88,166,255,0.55);border-color:rgba(88,166,255,1)}}
.bdot{width:6px;height:6px;border-radius:50%;background:#58a6ff;animation:db 1s ease-in-out infinite;flex-shrink:0}
@keyframes db{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.1;transform:scale(0.4)}}
#banner-day{font-size:0.95rem;font-weight:900;color:#fff;letter-spacing:0.08em;white-space:nowrap}
.bsep{font-size:0.8rem;color:rgba(88,166,255,0.3)}
#clock{font-family:'Share Tech Mono',monospace;font-size:1.2rem;color:#58a6ff;letter-spacing:0.08em;white-space:nowrap}
#banner-period{font-size:0.6rem;color:#fff;font-weight:700;background:rgba(88,166,255,0.18);border:1px solid rgba(88,166,255,0.5);padding:2px 7px;border-radius:10px;letter-spacing:0.06em;white-space:nowrap;animation:pb 1.2s ease-in-out infinite}
@keyframes pb{0%,100%{background:rgba(88,166,255,0.22)}50%{background:rgba(88,166,255,0.04)}}

.tbl-wrap{border-radius:10px;border:1px solid #efefef;box-shadow:0 0 24px rgba(0,0,0,0.5);overflow:hidden}
table{border-collapse:collapse;width:100%;table-layout:fixed}

th{background:#1c2128;color:#ffffff;font-size:0.88rem;font-weight:700;letter-spacing:0.1em;text-align:center;padding:3px 2px;border:1px solid #959595;height:24px;white-space:nowrap}
th.today-col{background:#ffffff!important;color:#1060d0!important;font-weight:900;animation:none!important}

td.pc{background:#161b22;font-family:'Share Tech Mono',monospace;font-size:0.75rem;color:#c0c8d4;text-align:center;border:1px solid #959595;padding:0;height:28px;font-weight:700;vertical-align:middle}
td.tc{background:#1c2128;font-family:'Share Tech Mono',monospace;font-size:0.62rem;color:#c0c8d4;text-align:center;border:1px solid #959595;padding:1px;height:28px;line-height:1.2;white-space:nowrap;font-weight:700;vertical-align:middle}
.next-row{color:rgba(255,255,255,0.85)!important;font-weight:700!important}

td.cc{position:relative;text-align:center;vertical-align:middle;border:1px solid #959595;padding:2px;height:28px;overflow:hidden}
td.cc.empty{background:#252d38}
.cn{font-weight:700;line-height:1.15;font-size:0.55rem;color:#000!important;display:block}
.cr{font-size:0.59rem;margin-top:1px;color:#00000097!important;font-weight:700;display:block}

.c-green{background:#92d050}.c-cyan{background:#00b0f0}.c-orange{background:#ffc000}
.c-purple{background:#cc99ff}.c-pink{background:#ff99cc}.c-lblue{background:#9bc2e6}
.c-yellow{background:#ffc000}.c-club{background:#ffffff}

@keyframes aglow{0%,100%{box-shadow:0 0 0 3px #ffffff,0 0 16px 4px rgba(255,255,255,0.7)}50%{box-shadow:0 0 0 3px rgba(255,255,255,0.2),0 0 28px 10px rgba(255,255,255,0.05)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.35}}
td.cc.active{animation:aglow 1.2s ease-in-out infinite;filter:brightness(1.3) saturate(1.4);z-index:2;outline:3px solid #ffffff;outline-offset:-3px}
td.cc.active .cn{animation:blink 1.2s ease-in-out infinite}
td.cc.active::after{content:'▶NOW';position:absolute;top:1px;right:1px;font-family:'Share Tech Mono',monospace;font-size:0.38rem;color:#fff;background:#1060d0;padding:1px 2px;border-radius:5px;animation:blink 1.2s ease-in-out infinite}
td.cc.next-class{filter:brightness(1.15) saturate(1.2);z-index:1;outline:3px solid #ffffff;outline-offset:-3px}
td.cc.next-class::after{content:'NEXT';position:absolute;top:1px;right:1px;font-family:'Share Tech Mono',monospace;font-size:0.38rem;color:#fff;background:#1060d0;padding:1px 2px;border-radius:5px}
td.cc.past::before{content:'';position:absolute;inset:0;background:rgba(13,17,23,0.72);z-index:1;pointer-events:none}
td.cc.past .cn{position:relative;z-index:2;color:#d1d5da!important}
td.cc.past .cr{position:relative;z-index:2;color:#b1b8c0!important}

#info-card{margin-top:6px;border-radius:10px;overflow:hidden;border:1px solid #959595;display:none}
.irow{display:flex;align-items:stretch;border-bottom:1px solid #959595}
.irow:last-child{border-bottom:none}
.ibadge{display:flex;align-items:center;justify-content:center;padding:0 10px;font-size:0.58rem;font-weight:900;letter-spacing:0.08em;white-space:nowrap;min-width:48px;flex-shrink:0}
.ibadge.now{background:#000000;color:#ffffff;border-right:2px solid #000000}
.ibadge.nxt{background:#000000;color:#ffffff;border-right:2px solid #000000;font-size:0.65rem}
.icont{display:flex;align-items:center;gap:8px;padding:5px 10px;flex:1;background:#161b22}
.iname{font-weight:700;font-size:0.75rem;flex:1;color:#e6edf3}
.irow.now-info{animation:nri 1.2s ease-in-out infinite}
@keyframes nri{0%,100%{background:rgba(88,166,255,0.06)}50%{background:transparent}}

/* ══ マップ ══ */
#campus-map-section{margin-top:8px;border-radius:10px;border:1px solid #959595;overflow:hidden;background:#161b22}
.map-header{padding:5px 10px;background:#1c2128;border-bottom:1px solid #959595;font-size:0.7rem;font-weight:700;color:#58a6ff;letter-spacing:0.1em}
.map-wrap{position:relative;width:100%;display:block;line-height:0;overflow-y:auto;overflow-x:hidden;max-height:80vh}
.map-wrap img{width:100%;height:auto;display:block}
.map-wrap svg{position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible}

/* ラベルの基本スタイル */
.bld-label{font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:900;fill:#333;text-anchor:middle;dominant-baseline:middle;pointer-events:none;}

/* NOW: 黒背景で点滅 */
@keyframes now-label-glow{
  0%,100%{fill:rgba(16, 96, 208, 1);stroke:#ffffff;stroke-width:2;  filter:drop-shadow(0 0 6px #1060d0)}
  50%    {fill:rgba(0,0,0,0.2); stroke:#ffffff;stroke-width:2.5;filter:drop-shadow(0 0 12px #1060d0)}
}
@keyframes now-text-blink{
  0%,100%{fill:#ffffff;opacity:1;font-size:16px}
  50%    {fill:#cccccc;opacity:0.8;font-size:16px}
}

.label-now-bg {animation:now-label-glow  1.2s ease-in-out infinite;}
.label-now-txt{animation:now-text-blink  1.2s ease-in-out infinite;font-weight:900!important}

.label-nxt-bg{fill:rgba(16, 96, 208, 1)!important;stroke:#ffffff!important;stroke-width:3!important;filter:drop-shadow(0 0 10px #000000);}
.label-nxt-txt{fill:#ffffff;font-weight:900!important;}

.map-legend{padding:5px 10px;font-size:0.62rem;color:#8b949e;display:flex;gap:12px;flex-wrap:wrap;background:#1c2128;border-top:1px solid #959595}
.leg-now{display:inline-block;width:28px;height:11px;background:#000000;border-radius:5px;border:2px solid #000000;margin-right:4px;vertical-align:middle}
.leg-nxt{display:inline-block;width:28px;height:11px;background:#000000;border-radius:5px;border:2px solid #000000;margin-right:4px;vertical-align:middle}

footer{text-align:center;margin-top:8px;font-size:0.56rem;color:#969696;letter-spacing:0.1em}
</style>
</head>

<footer>リアルタイム時間割 — 毎秒更新</footer>

<script>
const P={
  1:[9,0,9,59],2:[10,0,10,59],3:[11,0,11,59],4:[12,0,12,59],5:[13,0,13,59],
  6:[14,0,14,59],7:[15,0,15,59],8:[16,0,16,59],9:[17,0,17,59],10:[18,0,18,59]
};
const TL={1:'09:00',2:'10:00',3:'11:00',4:'12:00',5:'13:00',6:'14:00',7:'15:00',8:'16:00',9:'17:00',10:'18:00'};

const SCH={
  1:{1:{name:'物理学基礎',  room:'８１０８',              color:'c-green', rs:3},
     5:{name:'ドイツ語',    room:'５３０１',              color:'c-yellow',rs:2},
     7:{name:'物理学基礎 b',room:'８１０８',              color:'c-green', rs:1}},
  2:{1:{name:'視覚造形基礎',room:'12号5階\n各共用製図',color:'c-cyan',  rs:4},
     6:{name:'英語理解',    room:'５２０３',              color:'c-purple',rs:2},
     8:{name:'数学基礎 c',  room:'８１０６',              color:'c-lblue', rs:1},
     9:{name:'部活',        room:'',                  color:'c-club',  rs:2}},
  3:{1:{name:'知能メディア\n体験演習',room:'12号3階\n教室兼実習',color:'c-orange',rs:4},
     7:{name:'日本語表現法',room:'５３０３',              color:'c-pink',  rs:2}},
  4:{2:{name:'英語表現',    room:'５２０７',              color:'c-purple',rs:2},
     5:{name:'哲学',        room:'５２０１',              color:'c-pink',  rs:2}},
  5:{1:{name:'数学基礎',    room:'８１０６',              color:'c-lblue', rs:3},
     5:{name:'初年次教育',  room:'３２１２',              color:'c-orange',rs:2},
     7:{name:'数理・データ\nサイエンスAI',room:'３２１２',color:'c-cyan',  rs:2},
     9:{name:'部活',        room:'',                  color:'c-club',  rs:2}}
};

const DAYS=[1,2,3,4,5];
const WFULL=['日曜日','月曜日','火曜日','水曜日','木曜日','金曜日','土曜日'];
const PC=10;
const PC_BG='#161b22',TC_BG='#1c2128',PC_C='#8b949e',TC_C='#c0c8d4';

function toMin(h,m){return h*60+m}
function fmt2(n){return String(n).padStart(2,'0')}
function getCurP(nm){for(let p=1;p<=PC;p++){const[sh,sm,eh,em]=P[p];if(nm>=toMin(sh,sm)&&nm<=toMin(eh,em))return p;}return null}
function getCellFor(di,p){const d=SCH[di]||{};for(let sp=1;sp<=p;sp++){const c=d[sp];if(c&&sp+(c.rs||1)-1>=p)return{sp,cell:c};}return null}
function getNext(di,nm){const d=SCH[di]||{};let best=null;for(const k in d){const[sh,sm]=P[k];if(toMin(sh,sm)>nm&&(!best||toMin(sh,sm)<toMin(...P[best.sp].slice(0,2))))best={sp:parseInt(k),cell:d[k]};}return best}
function isPast(ep,nm){const[,,eh,em]=P[ep];return nm>toMin(eh,em)}

function buildTable(){
  const tbody=document.getElementById('tbody');tbody.innerHTML='';
  const skip={1:{},2:{},3:{},4:{},5:{}};
  for(let p=1;p<=PC;p++){
    const tr=document.createElement('tr');
    const tp=document.createElement('td');tp.className='pc';tp.id='fp-'+p;tp.dataset.pr=p;tp.textContent=p;tr.appendChild(tp);
    const tt=document.createElement('td');tt.className='tc';tt.id='ft-'+p;tt.dataset.pr=p;tt.textContent=TL[p];tr.appendChild(tt);
    DAYS.forEach(di=>{
      if(skip[di][p])return;
      const cell=(SCH[di]||{})[p];
      const td=document.createElement('td');td.className='cc';td.id='c-'+di+'-'+p;td.dataset.day=di;td.dataset.p=p;
      if(cell){
        const rs=cell.rs||1;td.dataset.ep=p+rs-1;
        if(rs>1){td.rowSpan=rs;for(let r=p+1;r<p+rs;r++)skip[di][r]=true;}
        td.classList.add(cell.color);
        const ne=document.createElement('span');ne.className='cn';ne.innerHTML=cell.name.replace(/\n/g,'<br>');td.appendChild(ne);
        if(cell.room){const re=document.createElement('span');re.className='cr';re.innerHTML=cell.room.replace(/\n/g,'<br>');td.appendChild(re);}
      } else {td.classList.add('empty');td.dataset.ep=p;}
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  }
}

function applyNowRow(p,on){
  const pe=document.getElementById('fp-'+p),te=document.getElementById('ft-'+p);
  if(!pe||!te)return;
  pe.style.backgroundColor=on?'#ffffff':PC_BG;pe.style.color=on?'#1060d0':PC_C;pe.style.fontWeight=on?'900':'700';
  te.style.backgroundColor=on?'#ffffff':TC_BG;te.style.color=on?'#1060d0':TC_C;te.style.fontWeight=on?'900':'700';
}

function getRoomBldId(room){
  if(!room)return null;

  room = room.replace(/\n/g,'').trim();

  // 特殊建物
  if(room.includes('体育館')) return 'gym';
  if(room.includes('図書館')) return 'lib';
  if(room.includes('食堂'))   return 'shk';
  if(room.includes('学生寮')) return '0';

  // 「12号館」「12号3階」対応
  const g = room.match(/(\d{1,2})号/);
  if(g) return g[1];

  // 「5203」「8108」等
  room = room.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
  const m = room.match(/^(\d)/);
  if(m) return m[1];

  return null;
}

// マップラベル更新
const ALL_BLDS=['0','gym','1','2','3','5','7','8','9','11','12','lib','shk'];
function updateMap(nowRoom, nxtRoom) {
  const nowId = getRoomBldId(nowRoom);
  const nxtId = getRoomBldId(nxtRoom);
  
  ALL_BLDS.forEach(id => {
    const bg = document.getElementById('bg-' + id);
    const txt = document.getElementById('txt-' + id);
  
    if (!bg || !txt) return;
  
    // リセット
    bg.setAttribute('class','');
    txt.setAttribute('class','bld-label');
  
    bg.setAttribute('fill','rgba(255,255,255,0.75)');
    bg.setAttribute('stroke','none');
  
    // NOW
    if (nowId === id) {
      bg.setAttribute('class','label-now-bg');
      txt.setAttribute('class','bld-label label-now-txt');
    }
  
    // NEXT
    else if (nxtId === id && nxtId !== nowId) {
      bg.setAttribute('class','label-nxt-bg');
      txt.setAttribute('class','bld-label label-nxt-txt');
    }
  });

  document.getElementById('legend-now').style.display = nowId ? 'inline' : 'none';
  document.getElementById('legend-nxt').style.display = (nxtId && nxtId !== nowId) ? 'inline' : 'none';
  document.getElementById('legend-none').style.display = (!nowId && !nxtId) ? 'inline' : 'none';
}

let prevP=null;

function update(){
  const now=new Date();
  const h=now.getHours(),m=now.getMinutes(),s=now.getSeconds(),dow=now.getDay();
  const nm=toMin(h,m);
  const todayDi=DAYS.includes(dow)?dow:null;

  document.getElementById('clock').textContent=fmt2(h)+':'+fmt2(m)+':'+fmt2(s);
  document.getElementById('banner-day').textContent=WFULL[dow];
  const cp=getCurP(nm);
  document.getElementById('banner-period').textContent=cp
    ?(()=>{const[sh,sm,eh,em]=P[cp];return'第'+cp+'限 '+fmt2(sh)+':'+fmt2(sm)+'〜'+fmt2(eh)+':'+fmt2(em);})()
    :'授業時間外';

  DAYS.forEach(d=>{const th=document.getElementById('th-'+d);if(th)th.classList.toggle('today-col',d===todayDi);});
  if(prevP!==null){applyNowRow(prevP,false);prevP=null;}
  document.querySelectorAll('.next-row').forEach(el=>el.classList.remove('next-row'));

  let act=null,nxt=null;
  if(todayDi){
    if(cp!==null){const f=getCellFor(todayDi,cp);if(f)act=f;}
    nxt=getNext(todayDi,nm);
    if(cp){applyNowRow(cp,true);prevP=cp;}
    if(nxt){
      const pe=document.getElementById('fp-'+nxt.sp),te=document.getElementById('ft-'+nxt.sp);
      if(pe)pe.classList.add('next-row');if(te)te.classList.add('next-row');
    }
  }

  document.querySelectorAll('td.cc').forEach(el=>{
    el.classList.remove('active','next-class','past');
    if(el.classList.contains('empty'))return;
    const di=parseInt(el.dataset.day);if(di!==todayDi)return;
    const sp=parseInt(el.dataset.p),ep=parseInt(el.dataset.ep);
    if(cp!==null&&cp>=sp&&cp<=ep)el.classList.add('active');
    else if(nxt&&sp===nxt.sp)el.classList.add('next-class');
    else if(isPast(ep,nm))el.classList.add('past');
  });

  updateInfoCard(act,nxt);
  updateMap(act?act.cell.room:null, nxt?nxt.cell.room:null);
}

function updateInfoCard(act,nxt){
  const card=document.getElementById('info-card');
  if(!act&&!nxt){card.style.display='none';return;}
  card.style.display='block';card.innerHTML='';
  const dow=new Date().getDay();
  function makeRow(label,cls,cell,sp){
    const d=document.createElement('div');d.className='irow'+(cls?' '+cls:'');
    d.innerHTML=`<div class="ibadge ${label==='現在'?'now':'nxt'}">${label}</div><div class="icont"><div class="iname">${WFULL[dow]} 第${sp}限：${cell.name.replace(/\n/g,' ')} <span style="color:#e6edf3;font-size:0.68rem;">${cell.room?'【'+cell.room.replace(/\n/g,' ')+'】':''}</span></div></div>`;
    return d;
  }
  if(act)card.appendChild(makeRow('現在','now-info',act.cell,act.sp));
  if(nxt)card.appendChild(makeRow('次回','',nxt.cell,nxt.sp));
}

buildTable();update();setInterval(update,1000);
</script>
